# ===== Server =====
server.port=${PORT:8080}

# ===== Database (H2 for dev - switch to MySQL for production) =====
spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== For MySQL (uncomment and fill in when deploying) =====
# spring.datasource.url=jdbc:mysql://localhost:3306/studentplatform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=StudentActivityPlatformSuperSecretKey2024XYZ!@#VeryLongSecretKeyForHS256Algorithm
app.jwt.expiration=86400000

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}